<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Notas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h2>Cálculo de Média</h2>
        
        <div class="input-group">
            <label for="nota1">Primeira Nota:</label>
            <input type="number" id="nota1" step="0.1" min="0" max="10" placeholder="Ex: 7.5">
        </div>

        <div class="input-group">
            <label for="nota2">Segunda Nota:</label>
            <input type="number" id="nota2" step="0.1" min="0" max="10" placeholder="Ex: 8.0">
        </div>

        <button onclick="calcularMedia()">Verificar Resultado</button>

        <div id="resultado" class="hidden">
            <p id="texto-media"></p>
            <p id="texto-status"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
